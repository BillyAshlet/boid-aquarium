<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>the boid 水族馆</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #071e3d;
        touch-action: none;
      }
      /* Everything lives inside #app so presentation rotation moves the
         whole UI as one unit. scene.js owns its size and transform. */
      #app {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transform-origin: top left;
      }
      canvas {
        display: block;
      }
      #status {
        position: absolute;
        left: 12px;
        bottom: max(12px, env(safe-area-inset-bottom));
        color: #9db8d8;
        font: 12px/1.5 "Space Mono", ui-monospace, monospace;
        pointer-events: none;
        white-space: pre;
      }
      #panel-holder {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 256px;
        z-index: 5;
      }
      .param-reset {
        cursor: pointer;
        opacity: 0.45;
        margin-left: 6px;
        user-select: none;
      }
      .param-reset:hover {
        opacity: 1;
      }
      #enable-tilt {
        position: absolute;
        left: 50%;
        bottom: 18%;
        transform: translateX(-50%);
        padding: 14px 28px;
        font: 14px "Space Mono", ui-monospace, monospace;
        color: #cfe3f7;
        background: rgba(12, 84, 166, 0.35);
        border: 1px solid #2e6db4;
        border-radius: 8px;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="status">…</div>
      <div id="panel-holder"></div>
      <button id="enable-tilt" hidden>enable tilt 🌀</button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
